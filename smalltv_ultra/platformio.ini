; Weather Station Wind Display
[env:weather-display]
platform = espressif8266
board = esp12e
framework = arduino

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=-1
    -D TFT_DC=0
    -D TFT_RST=2
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1

upload_speed = 921600
monitor_speed = 115200

board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m3m.ld
